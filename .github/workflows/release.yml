name: release

# Cut prebuilt `jd` binaries on a version tag. Each target is built with an
# explicit --target so we never depend on a retired runner image: the Intel
# macOS binary (x86_64-apple-darwin) cross-compiles on the Apple-Silicon
# macos-14 runner, since GitHub no longer offers Intel (macos-13) runners.
# rusqlite's bundled SQLite compiles fine cross-arch via the universal macOS SDK.
# Artifacts are packaged, checksummed, and attached to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-14,         target: x86_64-apple-darwin }
          - { os: macos-14,         target: aarch64-apple-darwin }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} --bin jd

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${{ github.ref_name == 'main' && inputs.tag || github.ref_name }}"
          name="jd-${tag}-${{ matrix.target }}"
          mkdir -p dist
          # --target output lands in the top-level ./target dir (pinned by
          # .cargo/config.toml).
          tar -czf "dist/${name}.tar.gz" -C "target/${{ matrix.target }}/release" jd

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name == 'main' && inputs.tag || github.ref_name }}"
          $name = "jd-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/jd.exe" -DestinationPath "dist/$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'main' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
