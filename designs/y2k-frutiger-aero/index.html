<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y2K / Frutiger Aero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --aero-sky-top: #aee4ff;
    --aero-sky-bottom: #4ab8ef;
    --aero-deep: #0d6fb8;
    --aero-aqua: #19c2ff;
    --aero-aqua-dark: #0a8fd6;
    --aero-green: #7ed957;
    --aero-green-dark: #3fa516;
    --aero-glass: rgba(255, 255, 255, 0.35);
    --aero-glass-line: rgba(255, 255, 255, 0.65);
    --aero-ink: #0a3c5c;
    --aero-ink-soft: #3a6b88;

    --r-md: 18px;
    --r-lg: 28px;
    --r-pill: 999px;

    --shadow-card:
      0 18px 40px -12px rgba(13, 111, 184, 0.45),
      0 2px 6px rgba(10, 60, 92, 0.18);
    --shadow-button:
      0 8px 18px -4px rgba(10, 143, 214, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.95),
      inset 0 -10px 16px -8px rgba(10, 143, 214, 0.65);
    --shadow-glass:
      inset 0 1px 0 rgba(255, 255, 255, 0.7),
      inset 0 0 0 1px rgba(255, 255, 255, 0.25),
      0 10px 30px -8px rgba(13, 111, 184, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    font-family: "Inter", "Segoe UI", "Myriad Pro", system-ui, sans-serif;
    color: var(--aero-ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    /* Atmospheric aqua sky gradient + lens-flare bloom + grass glow */
    background:
      radial-gradient(70% 50% at 78% 8%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 55%),
      radial-gradient(120% 60% at 50% 105%, rgba(126,217,87,0.55) 0%, rgba(126,217,87,0) 60%),
      linear-gradient(180deg, var(--aero-sky-top) 0%, var(--aero-sky-bottom) 100%);
    background-attachment: fixed;
    position: relative;
    overflow-x: hidden;
  }

  /* floating water bubbles, pure CSS */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.25) 22%, rgba(255,255,255,0) 45%),
      radial-gradient(circle at 70% 75%, rgba(13,111,184,0.18) 0%, rgba(13,111,184,0) 55%);
    box-shadow: inset 0 0 18px rgba(255,255,255,0.5), 0 4px 12px rgba(13,111,184,0.18);
    pointer-events: none;
    z-index: 0;
  }
  .b1 { width: 140px; height: 140px; top: 12%; left: 8%; }
  .b2 { width: 80px;  height: 80px;  top: 60%; left: 14%; }
  .b3 { width: 200px; height: 200px; top: 30%; right: 6%; }
  .b4 { width: 60px;  height: 60px;  top: 74%; right: 18%; }

  header {
    width: 100%;
    max-width: 640px;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 22px;
    margin-bottom: 28px;
    border-radius: var(--r-pill);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.32) 51%, rgba(255,255,255,0.1) 100%);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: var(--shadow-glass);
  }
  .logo {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #d6ffd0 0%, var(--aero-green) 45%, var(--aero-green-dark) 100%);
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.9), inset 0 -6px 10px rgba(63,165,22,0.7), 0 3px 8px rgba(63,165,22,0.4);
    flex: none;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    text-shadow: 0 1px 0 rgba(255,255,255,0.8);
  }
  header nav {
    margin-left: auto;
    display: flex;
    gap: 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--aero-ink-soft);
  }

  main {
    z-index: 1;
    width: 100%;
    max-width: 460px;
  }

  .card {
    position: relative;
    border-radius: var(--r-lg);
    padding: 28px 28px 30px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.25) 100%);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--aero-glass-line);
    box-shadow: var(--shadow-card), var(--shadow-glass);
    overflow: hidden;
  }
  /* top specular sheen across the glass card */
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 48%;
    border-radius: var(--r-lg) var(--r-lg) 50% 50% / var(--r-lg) var(--r-lg) 26px 26px;
    background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 100%);
    pointer-events: none;
  }
  .card > * { position: relative; }

  .card h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.85);
  }
  .card p.lead {
    font-size: 15px;
    line-height: 1.5;
    color: var(--aero-ink-soft);
    margin-bottom: 22px;
  }

  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 7px;
    color: var(--aero-ink);
  }
  .field input {
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    color: var(--aero-ink);
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.7);
    background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(225,244,255,0.85) 100%);
    box-shadow: inset 0 2px 5px rgba(13,111,184,0.18), 0 1px 0 rgba(255,255,255,0.8);
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  .field input::placeholder { color: #8fb3c8; }
  .field input:focus {
    box-shadow: inset 0 2px 5px rgba(13,111,184,0.2), 0 0 0 3px rgba(25,194,255,0.45);
  }

  /* glossy aqua candy primary button with specular reflection */
  .btn {
    position: relative;
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
    padding: 15px 22px;
    border: none;
    cursor: pointer;
    border-radius: var(--r-pill);
    text-shadow: 0 1px 1px rgba(10,90,140,0.55);
    background: linear-gradient(180deg, var(--aero-aqua) 0%, var(--aero-aqua-dark) 100%);
    box-shadow: var(--shadow-button);
    overflow: hidden;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }
  /* upper specular highlight (the gel sheen) */
  .btn::before {
    content: "";
    position: absolute;
    top: 2px; left: 6px; right: 6px;
    height: 44%;
    border-radius: var(--r-pill);
    background: linear-gradient(180deg, rgba(255,255,255,0.85) 0%, rgba(255,255,255,0.1) 100%);
    pointer-events: none;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active {
    transform: translateY(1px);
    box-shadow:
      0 4px 10px -4px rgba(10,143,214,0.5),
      inset 0 2px 6px rgba(10,143,214,0.55);
  }

  .footnote {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: var(--aero-ink-soft);
  }
  .footnote a { color: var(--aero-deep); font-weight: 500; text-decoration: none; }
</style>
</head>
<body>
  <div class="bubble b1"></div>
  <div class="bubble b2"></div>
  <div class="bubble b3"></div>
  <div class="bubble b4"></div>

  <header>
    <span class="logo" aria-hidden="true"></span>
    <h1>AquaCloud</h1>
    <nav>
      <span>Home</span>
      <span>Features</span>
      <span>Pricing</span>
    </nav>
  </header>

  <main>
    <section class="card">
      <h2>Stay fresh, stay synced.</h2>
      <p class="lead">
        Pure, crystal-clear cloud storage that keeps your files flowing.
        Create your account and dive in.
      </p>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" name="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <button class="btn" type="button">Get started free</button>

      <p class="footnote">
        Already aboard? <a href="#">Sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
