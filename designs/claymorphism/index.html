<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claymorphism</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E3DFFD;
    --surface: #FFFFFF;
    --accent: #FF9DAA;
    --accent-2: #A6E3D7;
    --ink: #5B5470;
    --r-sm: 20px;
    --r-md: 28px;
    --r-lg: 36px;
    --r-xl: 40px;
    --clay:
      0 18px 40px -12px rgba(91, 84, 112, 0.35),
      inset 0 8px 14px rgba(255, 255, 255, 0.9),
      inset 0 -10px 16px rgba(91, 84, 112, 0.22);
    --clay-accent:
      0 18px 40px -12px rgba(255, 110, 130, 0.5),
      inset 0 8px 14px rgba(255, 255, 255, 0.65),
      inset 0 -10px 16px rgba(200, 60, 80, 0.3);
    --clay-mint:
      0 14px 30px -10px rgba(80, 180, 160, 0.45),
      inset 0 7px 12px rgba(255, 255, 255, 0.8),
      inset 0 -9px 14px rgba(40, 140, 120, 0.28);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Baloo 2", system-ui, sans-serif;
    background:
      radial-gradient(at 20% 15%, #F3D7F2 0, transparent 45%),
      radial-gradient(at 85% 80%, #CFE8FB 0, transparent 45%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    line-height: 1.4;
  }

  .app { width: 100%; max-width: 440px; }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .logo {
    width: 64px;
    height: 64px;
    border-radius: var(--r-md);
    background: var(--accent-2);
    box-shadow: var(--clay-mint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }

  header h1 { font-size: 32px; font-weight: 800; }
  header p { font-size: 16px; font-weight: 500; opacity: 0.7; }

  .card {
    background: var(--surface);
    border-radius: var(--r-xl);
    box-shadow: var(--clay);
    padding: 32px;
  }

  .card h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .card .lead { font-size: 16px; font-weight: 500; opacity: 0.65; margin-bottom: 24px; }

  .field { margin-bottom: 24px; }

  .field label {
    display: block;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    padding-left: 8px;
  }

  .field input {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
    background: #F4F1FF;
    border: none;
    border-radius: var(--r-md);
    padding: 18px 22px;
    box-shadow:
      inset 0 6px 12px rgba(91, 84, 112, 0.16),
      inset 0 -4px 8px rgba(255, 255, 255, 0.9);
    outline: none;
  }

  .field input::placeholder { color: rgba(91, 84, 112, 0.4); }
  .field input:focus {
    box-shadow:
      inset 0 6px 12px rgba(91, 84, 112, 0.16),
      inset 0 -4px 8px rgba(255, 255, 255, 0.9),
      0 0 0 4px rgba(166, 227, 215, 0.6);
  }

  .btn {
    width: 100%;
    font-family: inherit;
    font-size: 20px;
    font-weight: 700;
    color: #8A2A38;
    background: var(--accent);
    border: none;
    border-radius: var(--r-lg);
    padding: 20px;
    cursor: pointer;
    box-shadow: var(--clay-accent);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .btn:hover { transform: translateY(-2px); }
  .btn:active {
    transform: translateY(2px);
    box-shadow:
      0 8px 18px -8px rgba(255, 110, 130, 0.5),
      inset 0 6px 14px rgba(200, 60, 80, 0.35),
      inset 0 -6px 10px rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">🪀</div>
      <div>
        <h1>Squish</h1>
        <p>soft little habit tracker</p>
      </div>
    </header>

    <div class="card">
      <h2>Welcome back</h2>
      <p class="lead">Pick up where your clay left off.</p>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@squish.app">
      </div>

      <button class="btn" type="button">Let's go</button>
    </div>
  </div>
</body>
</html>
