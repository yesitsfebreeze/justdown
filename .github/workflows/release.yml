name: release

# Cut prebuilt `jd` binaries on a version tag. Pure Go (no cgo), so one runner
# cross-compiles every target. Artifact names keep the historic target-triple
# form so the install scripts stay unchanged.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        run: go test ./...

      - name: Build all targets
        env:
          CGO_ENABLED: "0"
        run: |
          tag="${{ github.ref_name == 'main' && inputs.tag || github.ref_name }}"
          mkdir -p dist
          build() {
            goos="$1"; goarch="$2"; triple="$3"
            out="jd"; [ "$goos" = "windows" ] && out="jd.exe"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "build/$triple/$out" ./cmd/jd
            name="jd-${tag}-${triple}"
            if [ "$goos" = "windows" ]; then
              (cd "build/$triple" && zip -q "../../dist/${name}.zip" "$out")
            else
              tar -czf "dist/${name}.tar.gz" -C "build/$triple" "$out"
            fi
          }
          build linux   amd64 x86_64-unknown-linux-gnu
          build linux   arm64 aarch64-unknown-linux-gnu
          build darwin  amd64 x86_64-apple-darwin
          build darwin  arm64 aarch64-apple-darwin
          build windows amd64 x86_64-pc-windows-msvc

      - name: Checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'main' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
