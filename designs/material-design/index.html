<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material 3 — Material You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* M3 color roles — baseline purple seed, light scheme */
    --primary: #6750A4;
    --on-primary: #FFFFFF;
    --primary-container: #EADDFF;
    --on-primary-container: #21005D;
    --secondary: #625B71;
    --surface: #FEF7FF;
    --surface-variant: #E7E0EC;
    --surface-container: #F3EDF7;
    --surface-container-high: #ECE6F0;
    --on-surface: #1D1B20;
    --on-surface-variant: #49454F;
    --outline: #79747E;
    --outline-variant: #CAC4D0;
    --background: #FEF7FF;

    /* shape scale */
    --radius-medium: 12px;
    --radius-large: 16px;
    --radius-full: 9999px;

    /* elevation (M3 soft shadows) */
    --elev-1: 0 1px 2px rgba(0,0,0,.30), 0 1px 3px 1px rgba(0,0,0,.15);
    --elev-2: 0 1px 2px rgba(0,0,0,.30), 0 2px 6px 2px rgba(0,0,0,.15);
    --elev-3: 0 1px 3px rgba(0,0,0,.30), 0 4px 8px 3px rgba(0,0,0,.15);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Roboto', system-ui, sans-serif;
    color: var(--on-surface);
    background: var(--background);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Top app bar ---- */
  .top-app-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    height: 64px;
    padding: 0 16px;
    background: var(--surface-container);
    color: var(--on-surface);
    box-shadow: var(--elev-2);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-app-bar .icon-btn {
    width: 48px;
    height: 48px;
    border: none;
    border-radius: var(--radius-full);
    background: transparent;
    color: var(--on-surface-variant);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
  .top-app-bar .icon-btn:hover { background: rgba(103,80,164,.08); }
  .top-app-bar .title {
    font-size: 22px;
    line-height: 28px;
    font-weight: 400;
    margin: 0;
    flex: 1;
  }
  .top-app-bar .avatar {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-full);
    background: var(--primary-container);
    color: var(--on-primary-container);
    display: grid;
    place-items: center;
    font-size: 14px;
    font-weight: 500;
  }

  /* ---- Page ---- */
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }
  .overline {
    font-size: 11px;
    line-height: 16px;
    font-weight: 500;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--on-surface-variant);
    margin: 0 0 8px;
  }

  /* ---- Elevated card ---- */
  .card {
    background: var(--surface-container-high);
    border-radius: var(--radius-medium);
    box-shadow: var(--elev-1);
    padding: 16px;
    margin-bottom: 24px;
  }
  .card .headline {
    font-size: 22px;
    line-height: 28px;
    font-weight: 400;
    margin: 0 0 8px;
  }
  .card .body {
    font-size: 14px;
    line-height: 20px;
    color: var(--on-surface-variant);
    margin: 0;
  }
  .card .media {
    height: 120px;
    border-radius: var(--radius-medium);
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--primary-container), var(--surface-variant));
  }

  /* ---- Outlined text field with floating label ---- */
  .text-field {
    position: relative;
    margin: 8px 0 24px;
  }
  .text-field input {
    width: 100%;
    height: 56px;
    padding: 0 16px;
    font-family: inherit;
    font-size: 16px;
    line-height: 24px;
    color: var(--on-surface);
    background: transparent;
    border: 1px solid var(--outline);
    border-radius: var(--radius-medium);
    outline: none;
    transition: border-color .15s, border-width .15s;
  }
  .text-field input:hover { border-color: var(--on-surface); }
  .text-field input:focus {
    border: 2px solid var(--primary);
    padding: 0 15px;
  }
  .text-field label {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    padding: 0 4px;
    font-size: 16px;
    line-height: 1;
    color: var(--on-surface-variant);
    background: var(--surface);
    pointer-events: none;
    transition: top .15s, font-size .15s, color .15s;
  }
  /* notched / floating label on focus or when filled */
  .text-field input:focus + label,
  .text-field input:not(:placeholder-shown) + label {
    top: 0;
    font-size: 12px;
  }
  .text-field input:focus + label { color: var(--primary); }
  .text-field .supporting {
    display: block;
    margin: 4px 16px 0;
    font-size: 12px;
    line-height: 16px;
    color: var(--on-surface-variant);
  }

  /* ---- Actions row ---- */
  .actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* M3 buttons share a stadium radius + ripple */
  .btn {
    position: relative;
    overflow: hidden;
    height: 40px;
    padding: 0 24px;
    border: none;
    border-radius: var(--radius-full);
    font-family: inherit;
    font-size: 14px;
    line-height: 20px;
    font-weight: 500;
    letter-spacing: .1px;
    cursor: pointer;
    user-select: none;
  }
  .btn-filled {
    background: var(--primary);
    color: var(--on-primary);
  }
  .btn-filled:hover { box-shadow: var(--elev-1); }
  .btn-text {
    background: transparent;
    color: var(--primary);
    padding: 0 12px;
  }
  .btn-text:hover { background: rgba(103,80,164,.08); }

  /* ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: currentColor;
    opacity: .28;
    pointer-events: none;
    animation: ripple .5s linear;
  }
  @keyframes ripple { to { transform: scale(2.6); opacity: 0; } }

  /* ---- FAB ---- */
  .fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 56px;
    height: 56px;
    border: none;
    border-radius: var(--radius-large);
    background: var(--primary-container);
    color: var(--on-primary-container);
    box-shadow: var(--elev-3);
    font-size: 26px;
    line-height: 1;
    cursor: pointer;
    display: grid;
    place-items: center;
  }
</style>
</head>
<body>
  <header class="top-app-bar">
    <button class="icon-btn" aria-label="Menu">&#9776;</button>
    <h1 class="title">Inbox</h1>
    <button class="icon-btn" aria-label="Search">&#9906;</button>
    <span class="avatar">FB</span>
  </header>

  <main>
    <p class="overline">Today</p>

    <article class="card">
      <div class="media"></div>
      <h2 class="headline">Design review at 3:00</h2>
      <p class="body">The Material 3 refresh is ready for sign-off. Tonal surfaces, dynamic color, and the new shape scale are all in place.</p>
    </article>

    <form onsubmit="return false">
      <div class="text-field">
        <input id="reply" type="text" placeholder=" " autocomplete="off">
        <label for="reply">Your reply</label>
        <span class="supporting">Supporting text</span>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-text">Cancel</button>
        <button type="submit" class="btn btn-filled">Send</button>
      </div>
    </form>
  </main>

  <button class="fab" aria-label="Compose">&#9998;</button>

  <script>
    // Optional vanilla ripple — M3 ink emphasis.
    document.querySelectorAll('.btn').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        var r = document.createElement('span');
        var size = Math.max(btn.offsetWidth, btn.offsetHeight);
        var rect = btn.getBoundingClientRect();
        r.className = 'ripple';
        r.style.width = r.style.height = size + 'px';
        r.style.left = (e.clientX - rect.left - size / 2) + 'px';
        r.style.top = (e.clientY - rect.top - size / 2) + 'px';
        btn.appendChild(r);
        setTimeout(function () { r.remove(); }, 500);
      });
    });
  </script>
</body>
</html>
