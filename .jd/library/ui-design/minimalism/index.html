<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --hairline: #e5e5e5;
      --accent: #2563eb;
      --radius: 6px;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 64px 24px 96px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--hairline);
    }

    .wordmark {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    nav {
      display: flex;
      gap: 24px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
    }

    nav a:hover { color: var(--text); }

    .hero {
      padding: 64px 0 40px;
    }

    .hero h1 {
      margin: 0 0 16px;
      font-size: 48px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .hero p {
      margin: 0;
      max-width: 48ch;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 40px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }

    .card .lead {
      margin: 0 0 40px;
      color: var(--muted);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    input {
      font: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 12px 16px;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .button {
      appearance: none;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      color: var(--surface);
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 12px 24px;
      cursor: pointer;
    }

    .button:hover { opacity: 0.92; }

    footer {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--hairline);
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="wordmark">Quietly</div>
      <nav>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Less, but better.</h1>
      <p>A calm, content-first interface. Space does the work, type carries the meaning, and a single accent points the way.</p>
    </section>

    <section class="card">
      <h2>Stay in the loop</h2>
      <p class="lead">One short note each month. No noise, no clutter.</p>
      <form>
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@example.com">
        </div>
        <button class="button" type="submit">Subscribe</button>
      </form>
    </section>

    <footer>
      &copy; 2026 Quietly. Designed with restraint.
    </footer>
  </div>
</body>
</html>
