<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo-Brutalism — Reference UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --ink: #111111;
      --paper: #ffde00;
      --surface: #ffffff;
      --accent-2: #ff5470;
      --accent-3: #00e0c6;
      --radius: 0px;
      --border: 4px solid var(--ink);
      --shadow: 8px 8px 0 0 var(--ink);
      --shadow-sm: 5px 5px 0 0 var(--ink);
      --space: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.4;
      padding: 24px;
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    header.site {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--surface);
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 16px 24px;
      margin-bottom: 40px;
    }

    .brand {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    .brand .dot {
      background: var(--accent-2);
      border: 3px solid var(--ink);
      padding: 0 8px;
      margin-left: 4px;
    }

    nav.site {
      display: flex;
      gap: 12px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    nav.site a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 3px solid transparent;
    }

    nav.site a:hover {
      border-bottom-color: var(--ink);
    }

    .card {
      background: var(--surface);
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 32px;
    }

    .tag {
      display: inline-block;
      background: var(--accent-3);
      border: 3px solid var(--ink);
      box-shadow: var(--shadow-sm);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    p.lead {
      font-size: 1.05rem;
      margin-bottom: 24px;
      max-width: 50ch;
    }

    form {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }

    label {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }

    input[type="email"] {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      padding: 12px 14px;
      background: var(--surface);
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      outline: none;
    }

    input[type="email"]:focus {
      background: #fffbe6;
      box-shadow: 5px 5px 0 0 var(--accent-2);
    }

    .btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      cursor: pointer;
      padding: 14px 24px;
      color: var(--ink);
      background: var(--accent-2);
      border: var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }

    .btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 6px 6px 0 0 var(--ink);
    }

    .btn:active {
      transform: translate(8px, 8px);
      box-shadow: 0 0 0 0 var(--ink);
    }

    footer.note {
      margin-top: 24px;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site">
      <div class="brand">Bold<span class="dot">CO</span></div>
      <nav class="site">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <span class="tag">New · 2026</span>
        <h1>Ship loud. Ship raw.</h1>
        <p class="lead">
          A starter kit with thick borders, hard shadows, and zero apologies.
          Drop your email and grab the first build.
        </p>

        <form onsubmit="return false">
          <label for="email">Email address</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </form>

        <button class="btn" type="button">Get early access</button>

        <footer class="note">No spam. Just bold builds.</footer>
      </section>
    </main>
  </div>
</body>
</html>
