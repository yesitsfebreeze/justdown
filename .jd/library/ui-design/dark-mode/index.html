<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode — OLED-first</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --surface-1: #0e0e10;
    --surface-2: #16161a;
    --surface-3: #1e1e24;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.14);
    --text: #ececee;
    --text-muted: #9a9aa2;
    --accent: #7c9df0;
    --accent-strong: #6b8de8;
    --on-accent: #0a0a0c;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
  }

  header {
    width: 100%;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(140deg, var(--accent), var(--accent-strong));
    box-shadow: 0 0 0 1px var(--border-strong);
  }

  header .title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header .badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
  }

  main {
    width: 100%;
    max-width: 420px;
    padding: 48px 24px;
  }

  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .card h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card p.lead {
    margin: 0 0 24px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.01em;
  }

  input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font: inherit;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input::placeholder { color: #5d5d66; }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124, 157, 240, 0.30);
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: var(--on-accent);
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  .btn:hover { background: var(--accent-strong); }

  .btn:active { transform: translateY(1px); }

  .btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(124, 157, 240, 0.30);
  }

  .meta {
    margin-top: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  .meta a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <span class="title">Lumen</span>
    <span class="badge">OLED dark</span>
  </header>

  <main>
    <section class="card">
      <h1>Welcome back</h1>
      <p class="lead">Sign in to pick up where you left off.</p>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••">
      </div>

      <button class="btn" type="button">Sign in</button>

      <p class="meta">No account yet? <a href="#">Create one</a></p>
    </section>
  </main>
</body>
</html>
